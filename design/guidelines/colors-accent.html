<!-- @dsCard group="Colors" viewport="700x300" name="Accent — swappable" subtitle="Gold is default; green, blue & orange swap via data-accent" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--app-bg); font-family:var(--font-sans); color:var(--text-primary); padding:22px; }
  .themes { display:flex; gap:10px; margin-bottom:18px; }
  .theme { display:flex; align-items:center; gap:8px; padding:7px 13px 7px 9px; border-radius:999px; cursor:pointer;
    background:var(--surface-base); border:1px solid var(--border-strong); font-size:13px; font-weight:700; color:var(--text-secondary); }
  .theme[aria-pressed="true"] { background:var(--surface-selected); border-color:var(--accent-border); color:var(--text-primary); }
  .dot { width:16px; height:16px; border-radius:999px; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08); }
  .ramp { display:flex; gap:12px; flex-wrap:wrap; }
  .sw { width:120px; border-radius:var(--radius-control); overflow:hidden; border:1px solid var(--border-subtle); box-shadow:var(--shadow-low); }
  .chip { height:58px; display:flex; align-items:center; justify-content:center; }
  .meta { padding:8px 10px; background:var(--surface-base); }
  .name { font-size:12px; font-weight:700; color:var(--text-primary); }
  .role { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .live { display:inline-flex; align-items:center; gap:8px; margin-left:auto; padding:6px 12px; border-radius:999px; font-size:13px; font-weight:700;
    background:var(--accent); color:var(--accent-foreground); border:1px solid var(--accent-border); }
</style></head>
<body>
  <div class="themes" id="themes">
    <button class="theme" data-t="gold"   aria-pressed="true"><span class="dot" style="background:#d7aa38"></span>Gold</button>
    <button class="theme" data-t="green"  aria-pressed="false"><span class="dot" style="background:#6f9b53"></span>Green</button>
    <button class="theme" data-t="blue"   aria-pressed="false"><span class="dot" style="background:#5680b4"></span>Blue</button>
    <button class="theme" data-t="orange" aria-pressed="false"><span class="dot" style="background:#db7f3c"></span>Orange</button>
    <span class="live">Live accent</span>
  </div>
  <div class="ramp">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="name">accent</div><div class="role">--accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="meta"><div class="name">hover</div><div class="role">--accent-hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-border)"></div><div class="meta"><div class="name">border</div><div class="role">--accent-border</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-light)"></div><div class="meta"><div class="name">light</div><div class="role">--accent-light</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-foreground);color:var(--accent-light)">Aa</div><div class="meta"><div class="name">foreground</div><div class="role">--accent-foreground</div></div></div>
  </div>
<script>
  const root = document.documentElement;
  root.dataset.accent = "gold";
  document.getElementById("themes").addEventListener("click", (e) => {
    const b = e.target.closest(".theme"); if (!b) return;
    root.dataset.accent = b.dataset.t;
    document.querySelectorAll(".theme").forEach((t) => t.setAttribute("aria-pressed", String(t === b)));
  });
</script>
</body></html>
