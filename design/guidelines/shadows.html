<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Whisper-soft, warm-brown tint — content barely lifts" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--app-bg); font-family:var(--font-sans); padding:30px; display:flex; gap:26px; flex-wrap:wrap; }
  .item { text-align:center; }
  .box { width:120px; height:74px; background:var(--surface-elevated); border:1px solid var(--border-subtle); border-radius:var(--radius-panel); }
  .n { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:12px; }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-low)"></div><div class="n">shadow-low</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-medium)"></div><div class="n">shadow-medium</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-high)"></div><div class="n">shadow-high</div></div>
</body></html>
