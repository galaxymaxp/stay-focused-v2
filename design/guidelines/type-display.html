<!-- @dsCard group="Type" viewport="700x300" name="Display & headings" subtitle="Hanken Grotesk (Aptos substitute), tight tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--app-bg); font-family:var(--font-sans); color:var(--text-primary); padding:24px; }
  .row { display:flex; align-items:baseline; gap:14px; padding:8px 0; border-bottom:1px solid var(--border-subtle); }
  .row:last-child { border-bottom:0; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); min-width:138px; }
  .d { font-size:var(--type-display); font-weight:800; letter-spacing:var(--tracking-display); line-height:1; }
  .h1 { font-size:var(--type-h1); font-weight:800; letter-spacing:var(--tracking-tight); }
  .h2 { font-size:var(--type-h2); font-weight:700; letter-spacing:var(--tracking-tight); }
  .h3 { font-size:var(--type-h3); font-weight:600; }
</style></head>
<body>
  <div class="row"><span class="tag">display · 34/800</span><span class="d">1h 12m left</span></div>
  <div class="row"><span class="tag">h1 · 24/800</span><span class="h1">Today</span></div>
  <div class="row"><span class="tag">h2 · 19/700</span><span class="h2">Draft Chapter 3 — Methodology</span></div>
  <div class="row"><span class="tag">h3 · 16/600</span><span class="h3">Review series &amp; sequences</span></div>
</body></html>
