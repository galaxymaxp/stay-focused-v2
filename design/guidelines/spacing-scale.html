<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base rhythm, rem-based" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--app-bg); font-family:var(--font-sans); padding:24px; }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:9px; }
  .bar { height:14px; background:var(--accent); border-radius:3px; }
  .lbl { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); min-width:150px; }
</style></head>
<body>
  <div class="row"><span class="lbl">--space-1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl">--space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">--space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl">--space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">--space-6 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">--space-8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl">--space-12 · 48px</span><div class="bar" style="width:48px"></div></div>
</body></html>
