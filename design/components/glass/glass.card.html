<!-- @dsCard group="Components" viewport="700x440" name="Glass chrome — Nav bar, Tab bar, FAB" subtitle="iOS 26 Liquid Glass: gold-tinted, blurred, floating" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--app-bg); font-family: var(--font-sans); }
  .frame { position: relative; height: 440px; overflow: hidden; }
  /* content behind glass so the blur is visible */
  .bed { position: absolute; inset: 0; padding: 64px 18px 24px; display: grid; gap: 12px; align-content: start; }
  .bed .blk { height: 56px; border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-low); }
  .bed .a { background: color-mix(in srgb, var(--accent) 16%, var(--surface-base)); }
  .bed .b { background: var(--surface-base); }
  .bed .c { background: color-mix(in srgb, var(--blue) 14%, var(--surface-base)); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { GlassNavBar, GlassTabBar, GlassFAB } = window.StayFocusedDesignSystem_d2c06c;
  const ic = (d, s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
  const Cal = ic(<><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="m9 16 2 2 4-4"/></>);
  const Book = ic(<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>);
  const Lib = ic(<><path d="m16 6 4 14M12 6v14M8 8v12M4 4v16"/></>);
  const Bell = ic(<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>, 20);
  const Plus = ic(<><path d="M5 12h14M12 5v14"/></>, 24);

  function Demo() {
    const [tab, setTab] = React.useState("today");
    return (
      <div className="frame">
        <div className="bed">
          <div className="blk a"></div><div className="blk b"></div>
          <div className="blk c"></div><div className="blk b"></div>
          <div className="blk a"></div><div className="blk b"></div>
        </div>
        <GlassNavBar subtitle="Tuesday · Jun 14" title="Today" large
          trailing={<span style={{display:"inline-flex", padding:8, borderRadius:999, color:"var(--text-secondary)"}}>{Bell}</span>} />
        <GlassFAB icon={Plus} aria-label="New block" />
        <GlassTabBar activeId={tab} onSelect={setTab} items={[
          { id:"today", label:"Today", icon: Cal },
          { id:"courses", label:"Courses", icon: Book },
          { id:"library", label:"Library", icon: Lib },
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
