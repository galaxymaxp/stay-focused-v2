<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--app-bg); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Chip, Badge, Card } = window.StayFocusedDesignSystem_d2c06c;
  const ic = (d) => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
  const Play = ic(<polygon points="6 3 20 12 6 21 6 3" />);
  const Check = ic(<polyline points="20 6 9 17 4 12" />);

  function Demo() {
    return (
      <div>
        <p className="kicker">Buttons</p>
        <div className="row">
          <Button variant="primary" iconLeft={Play}>Start now</Button>
          <Button variant="secondary">Snooze 15m</Button>
          <Button variant="ghost">Skip</Button>
          <Button variant="danger">Drop block</Button>
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <p className="kicker">Chips</p>
        <div className="row">
          <Chip tone="accent">MATH 211</Chip>
          <Chip tone="green" iconLeft={Check}>Grounded</Chip>
          <Chip tone="amber">Due 6 PM</Chip>
          <Chip tone="red">Overdue</Chip>
          <Chip tone="blue">Lecture</Chip>
          <Chip tone="neutral" soft={false}>3 modules</Chip>
        </div>
        <p className="kicker">Badges &amp; cards</p>
        <div className="row">
          <Badge count={3} />
          <Badge count={128} tone="red" />
          <Badge dot tone="green" />
          <Card padding="sm" style={{ minWidth: 140 }}>Flat surface</Card>
          <Card padding="sm" selected style={{ minWidth: 140 }}>Selected</Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
